# Clokr Production Compose — no source code needed
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Requirements: .env file (copy from .env.example)

name: clokr

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clokr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-clokr}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clokr} -d ${POSTGRES_DB:-clokr}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  api:
    image: ghcr.io/sebastianz84/clokr-api:${CLOKR_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      API_PORT: "4000"
      API_HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-clokr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clokr}"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars)}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${APP_URL:-http://localhost:3000}
      REDIS_URL: "redis://redis:6379"
      APP_URL: ${APP_URL:-http://localhost:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env (min 32 chars)}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      NFC_TERMINAL_SECRET: ${NFC_TERMINAL_SECRET:-}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/sebastianz84/clokr-web:${CLOKR_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      ORIGIN: ${APP_URL:-http://localhost:3000}
      API_URL: "http://api:4000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    depends_on:
      api:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-clokr}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-clokr}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c 'while true; do
        pg_dump -Fc > /backups/clokr_$$(date +%Y%m%d_%H%M%S).dump &&
        echo "Backup completed" &&
        find /backups -name "*.dump" -mtime +7 -delete;
        sleep 86400;
      done'
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - backup

volumes:
  postgres_data:
  redis_data:
  minio_data:
